[package]
name = "ergo-node-rust"
version = "0.1.0"
edition = "2021"
description = "Full Ergo blockchain node in Rust"

[dependencies]
enr-chain = { path = "chain" }
enr-p2p = { path = "p2p" }
tracing = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
sigma-ser = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "6e76e82" }
serde_json = "1"
