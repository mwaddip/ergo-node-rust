[workspace]
members = [".", "sync", "validation", "state", "mempool", "api", "mining"]

[package]
name = "ergo-node-rust"
version = "0.1.0"
edition = "2021"
description = "Full Ergo blockchain node in Rust"

[dependencies]
enr-chain = { path = "chain" }
enr-p2p = { path = "p2p" }
enr-state = { path = "state" }
enr-store = { path = "store" }
ergo-api = { path = "api" }
ergo-sync = { path = "sync" }
ergo_avltree_rust = { git = "https://github.com/mwaddip/ergo_avltree_rust.git", rev = "28862a1" }
ergo-chain-types = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "38d38ece" }
ergo-lib = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "38d38ece" }
ergo-mempool = { path = "mempool" }
ergo-mining = { path = "mining" }
ergo-validation = { path = "validation" }
bytes = "1"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
sigma-ser = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "38d38ece" }
toml = "0.8"
tracing = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
lru = "0.16"
anyhow = "1"
redb = "4"

[dev-dependencies]
sigma-ser = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "38d38ece" }
serde_json = "1"
tempfile = "3"
