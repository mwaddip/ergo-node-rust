[package]
name = "ergo-validation"
version = "0.1.0"
edition = "2021"
description = "Block validation for the Ergo Rust node"

[dependencies]
ergo-lib = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "2de209be" }
ergo-chain-types = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "2de209be" }
sigma-ser = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "2de209be" }
ergo_avltree_rust = { git = "https://github.com/mwaddip/ergo_avltree_rust.git", rev = "28862a1" }
rayon = "1"
blake2 = "0.10"
bytes = "1"
hex = "0.4"
tracing = "0.1"
thiserror = "2"

[dev-dependencies]
ergotree-interpreter = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "2de209be" }
ergotree-ir = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "2de209be" }
