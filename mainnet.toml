# Mainnet config — connects to public mainnet peers

[proxy]
network = "mainnet"

[node]
data_dir = ".local-data/mainnet"
state_type = "utxo"
blocks_to_keep = 0

# Cold-sync memory settings — used during initial sync from genesis (or
# from a snapshot) up to the chain tip. Tuned for throughput.
cache_mb = 1024
flush_heap_threshold_mb = 2048

# At-tip memory settings — applied once the chain reaches tip. Per-block
# updates are tiny at tip cadence, so the validator can run with a much
# smaller working set. The synced_cache_mb transition reopens the AVL
# state DB (a few-ms pause) since redb's cache size is fixed at open.
synced_cache_mb = 256
synced_flush_heap_threshold_mb = 512
synced_flush_max_blocks = 5
synced_flush_min_blocks = 1

[listen.ipv6]
address = "[::]:9030"
mode = "full"
max_inbound = 20

[outbound]
min_peers = 3
max_peers = 10
seed_peers = [
    "213.239.193.208:9030",
    "159.65.11.55:9030",
    "165.227.26.175:9030",
    "159.89.116.15:9030",
    "136.244.110.145:9030",
    "94.130.108.35:9030",
    "51.75.147.1:9020",
    "221.165.214.185:9030",
    "217.182.197.196:9030",
    "173.212.220.9:9030",
    "176.9.65.58:9130",
    "213.152.106.56:9030",
    "[2001:41d0:700:6662::]:29031",
]

[identity]
agent_name = "ergo-node-rust"
peer_name = "ergo-node-rust-mainnet"
protocol_version = "6.0.3"
