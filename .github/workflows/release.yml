name: release

# Build a release on every pushed tag matching `v*`. Produces a stripped
# release binary, packages it as a Debian package and a portable tar.gz,
# and attaches both to a GitHub Release for the tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for creating the release + uploading assets

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          # Top-level submodules only — fetches chain, p2p, state, store,
          # facts but NOT their nested facts/ pointers. The nested
          # facts/ submodules are docs read by per-submodule Claude
          # sessions and are not part of the build inputs; one of them
          # (p2p/facts) currently points at a pruned commit, so
          # `recursive` would fail the checkout.
          submodules: true
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build .deb package
        run: ./build-deb

      - name: Build .tar.gz bundle
        run: ./build-tar

      - name: Build addon tar.gz bundles
        run: ./build-addons-tar

      - name: Build addon .deb packages
        run: ./build-addons-deb

      - name: Collect artifact paths
        id: artifacts
        run: |
          set -euo pipefail
          deb=$(ls target/ergo-node-rust_*.deb | head -1)
          tar=$(ls target/ergo-node-rust-*.tar.gz | head -1)
          indexer_tar=$(ls target/ergo-indexer-*.tar.gz | head -1)
          fastsync_tar=$(ls target/ergo-fastsync-*.tar.gz | head -1)
          indexer_deb=$(ls target/ergo-indexer_*.deb | head -1)
          fastsync_deb=$(ls target/ergo-fastsync_*.deb | head -1)
          echo "deb=${deb}" >> "$GITHUB_OUTPUT"
          echo "tar=${tar}" >> "$GITHUB_OUTPUT"
          echo "indexer_tar=${indexer_tar}" >> "$GITHUB_OUTPUT"
          echo "fastsync_tar=${fastsync_tar}" >> "$GITHUB_OUTPUT"
          echo "indexer_deb=${indexer_deb}" >> "$GITHUB_OUTPUT"
          echo "fastsync_deb=${fastsync_deb}" >> "$GITHUB_OUTPUT"
          ls -lh "${deb}" "${tar}" "${indexer_tar}" "${fastsync_tar}" "${indexer_deb}" "${fastsync_deb}"

      - name: Extract tag annotation
        id: tagbody
        run: |
          # Pipe the annotated tag's message into $GITHUB_OUTPUT as a
          # multi-line value. `generate_release_notes: true` alone only
          # emits the auto-changelog link when commits land directly on
          # main (no PRs to summarize), which leaves the release body
          # empty. Sourcing from the tag annotation guarantees substance.
          #
          # actions/checkout on a tag-push trigger sometimes lands the
          # ref as a lightweight tag, in which case `%(contents)` falls
          # back to the commit message. Re-fetch tags explicitly so the
          # annotated object is present locally.
          git fetch --tags --force
          {
            echo 'body<<EOF_TAG_BODY'
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}"
            echo 'EOF_TAG_BODY'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.artifacts.outputs.deb }}
            ${{ steps.artifacts.outputs.tar }}
            ${{ steps.artifacts.outputs.indexer_tar }}
            ${{ steps.artifacts.outputs.fastsync_tar }}
            ${{ steps.artifacts.outputs.indexer_deb }}
            ${{ steps.artifacts.outputs.fastsync_deb }}
          body: ${{ steps.tagbody.outputs.body }}
          generate_release_notes: true
          fail_on_unmatched_files: true
