# Ergo Node Rust — system install configuration
#
# Installed by the .deb package to /etc/ergo-node/ergo.toml. Overrides
# only the fields the system install needs to differ from the binary's
# built-in defaults — chiefly `data_dir`, which points at the package's
# system state directory rather than the in-pwd default used by tarball
# installs.
#
# For the full documented option set, see ergo.toml.example shipped at
# /usr/share/doc/ergo-node-rust/examples/ergo.toml.example.
#
# This file is registered as a dpkg conffile — your edits are preserved
# across package upgrades.

[proxy]
network = "testnet"

[node]
data_dir = "/var/lib/ergo-node/data"

[listen.ipv6]
address = "[::]:9030"
mode = "full"
max_inbound = 20

[outbound]
min_peers = 3
max_peers = 10
seed_peers = [
    "213.239.193.208:9023",
    "128.253.41.110:9020",
    "176.9.15.237:9021",
]

[identity]
agent_name = "ergo-node-rust"
peer_name = "ergo-node-rust"
protocol_version = "6.0.3"
