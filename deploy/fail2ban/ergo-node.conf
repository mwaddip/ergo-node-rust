# fail2ban filter for ergo-node-rust
# Matches the `peer_penalised` PENALTY journal event defined in
# facts/journal-events.md v1.0 — named-field format with the
# permanent-ban kind vocabulary listed in p2p/src/blacklist.rs.
#
# Log format (tracing default subscriber):
#   2026-05-16T12:00:00Z WARN PENALTY peer=1.2.3.4 kind="bad_magic"
#   2026-05-16T12:00:01Z WARN PENALTY peer=1.2.3.4 kind="handshake_failed" detail=...
#
# Only the six permanent-ban kinds match this filter. The two
# logged-only misbehavior kinds (message_parse_failed,
# connection_limit_exceeded) are intentionally NOT actioned —
# operators who want to ban them can add a separate jail.

[Definition]
failregex = PENALTY peer=<HOST> kind="(?:bad_magic|oversized_frame|bad_checksum|handshake_failed|address_sanity|malformed_peers)"
ignoreregex =
