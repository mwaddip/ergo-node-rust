# fail2ban filter for ergo-node-rust
# Matches structured PENALTY log lines emitted by the node.
#
# Log format:
#   PENALTY peer_ip=1.2.3.4 type=permanent reason="bad magic bytes"
#   PENALTY peer_ip=1.2.3.4 type=misbehavior reason="modifier parse failed"
#   PENALTY peer_ip=1.2.3.4 type=spam reason="unrequested modifier"
#   PENALTY peer_ip=1.2.3.4 type=nondelivery reason="delivery timeout"

[Definition]
failregex = PENALTY peer_ip=<HOST> type=(?:permanent|misbehavior|spam|nondelivery) reason="[^"]*"
ignoreregex =
