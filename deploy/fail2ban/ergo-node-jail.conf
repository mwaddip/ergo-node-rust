# fail2ban jail for ergo-node-rust
#
# The node emits `peer_penalised` PENALTY events for every misbehavior
# kind defined in facts/journal-events.md. The five permanent-ban kinds
# (bad_magic, oversized_frame, bad_checksum, handshake_failed,
# malformed_peers) are wire-level attacks or
# unrecoverable protocol violations — one hit is enough.
#
# Misbehavior kinds (message_parse_failed, connection_limit_exceeded)
# are intentionally logged without an auto-ban; the node's own
# in-memory blacklist closes connections from repeat offenders
# without operator help. Operators who want misbehavior auto-ban can
# add a second jail referencing those kinds.

[ergo-node-permanent]
enabled       = true
filter        = ergo-node
backend       = systemd
journalmatch  = _SYSTEMD_UNIT=ergo-node-rust.service
port          = 9030,9130
maxretry      = 1
findtime      = 1
bantime       = 86400
