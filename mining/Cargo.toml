[package]
name = "ergo-mining"
version = "0.1.0"
edition = "2021"
description = "Block candidate assembly and PoW solution validation for external miners"

[dependencies]
ergo-lib = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "d8a588a1" }
ergo-chain-types = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "d8a588a1" }
ergo-nipopow = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "d8a588a1" }
ergo-merkle-tree = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "d8a588a1" }
ergo-validation = { path = "../validation" }
sigma-ser = { git = "https://github.com/mwaddip/sigma-rust.git", rev = "d8a588a1" }
blake2 = "0.10"
hex = "0.4"
num-bigint = "0.4"
serde = { version = "1", features = ["derive"] }
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
