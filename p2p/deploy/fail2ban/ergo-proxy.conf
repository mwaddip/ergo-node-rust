# fail2ban filter for ergo-proxy-node
# Matches `peer_penalised` PENALTY log lines whose `kind` field is
# in the permanent-ban set defined by `facts/journal-events.md` and
# enumerated in `src/blacklist.rs`. Misbehavior kinds (logged but
# not actioned) are deliberately excluded.
#
# Log format (tracing default subscriber, named-field shape — `peer`
# is rendered via Display so the IP appears unquoted, `kind` is a
# string literal so tracing wraps it in double quotes):
#   2026-05-15T14:00:00Z  WARN enr_p2p: PENALTY peer=1.2.3.4 kind="bad_magic"
#   2026-05-15T14:00:00Z  WARN enr_p2p: PENALTY peer=1.2.3.4 kind="handshake_failed" detail=...

[Definition]

# Match a PENALTY line whose `kind` is one of the permanent-ban kinds.
# The tracing subscriber emits fields in declaration order; `peer=` is
# always first so `<HOST>` lands on the IP.
failregex = PENALTY peer=<HOST> kind="(?:bad_magic|oversized_frame|bad_checksum|handshake_failed|address_sanity|malformed_peers)"

ignoreregex =
