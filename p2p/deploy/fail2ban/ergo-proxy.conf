# fail2ban filter for ergo-proxy-node
# Matches PENALTY log lines with a peer_ip= field
#
# Log format (tracing default):
#   2026-04-09T00:01:11.444Z  WARN ergo_proxy_node: PENALTY peer_ip=1.2.3.4 type=permanent reason="bad magic bytes"
#   2026-04-09T00:01:11.444Z  WARN ergo_proxy_node: PENALTY peer_ip=1.2.3.4 type=misbehavior reason="handshake failed: ..."

[Definition]

# Match any PENALTY line with a peer_ip= field
failregex = PENALTY peer_ip=<HOST> type=permanent

ignoreregex =
